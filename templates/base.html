<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Wayne Industries{% endblock %} — Sistema de Segurança</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
<div class="layout">

  <!-- ════ SIDEBAR ════ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">W</div>
      <div class="brand-text">
        <h2>WAYNE</h2>
        <p>Industries</p>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar">{{ session.name[0] | upper }}</div>
      <div class="user-meta">
        <div class="u-name">{{ session.name }}</div>
        <div class="u-role">{{ session.role }}</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Menu</div>
        <a href="{{ url_for('dashboard') }}"
           class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="{{ url_for('resources') }}"
           class="nav-link {% if request.endpoint == 'resources' %}active{% endif %}">
          <span class="nav-icon">🗄️</span>
          <span>Recursos</span>
        </a>
        {% if session.role == 'admin' %}
        <a href="{{ url_for('users') }}"
           class="nav-link {% if request.endpoint == 'users' %}active{% endif %}">
          <span class="nav-icon">👥</span>
          <span>Usuários</span>
        </a>
        {% endif %}
      </div>
    </nav>

    <div class="sidebar-bottom">
      <a href="{{ url_for('logout') }}" class="nav-link">
        <span class="nav-icon">🚪</span>
        <span>Sair</span>
      </a>
    </div>
  </aside>

  <!-- ════ MAIN ════ -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
